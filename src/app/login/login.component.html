<div class="flex items-center justify-center min-h-screen bg-base-200">
  <div class="card w-96 bg-base-100 shadow-xl">
    <div class="card-body">
      <h2 class="card-title justify-center text-3xl font-bold mb-6 text-white">Iniciar Sesión</h2>
      <form [formGroup]="formLogin" (ngSubmit)="login()" class="flex flex-col gap-4">
        <label class="form-control w-full">
          <div class="label">
            <span class="label-text">Correo Electrónico</span>
          </div>
          <input type="email" placeholder="ejemplo@correo.com" class="input input-bordered w-full" formControlName="email"/>
        </label>
        
        <label class="form-control w-full">
          <div class="label">
            <span class="label-text">Contraseña</span>
          </div>
          <input type="password" placeholder="Contraseña" class="input input-bordered w-full" formControlName="password"/>
        </label>
        
        <div class="card-actions justify-end mt-4">
          <button class="btn btn-primary w-full" [disabled]="formLogin.invalid">Acceder</button>
        </div>
      </form>
    </div>
  </div>
</div>
