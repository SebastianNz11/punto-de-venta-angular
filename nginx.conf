# nginx.conf para Angular 21 SPA - proyecto "crud"
server {
    listen 8080;
    server_name localhost;

    # Carpeta donde están los archivos compilados de Angular
    root /usr/share/nginx/html;
    index index.html;

    # Reescribe todas las rutas al index.html para que Angular maneje el routing SPA
    location / {
        try_files $uri /index.html;
    }

    # Opcional: servir archivos estáticos (js, css, img) directamente
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|ttf|svg|eot)$ {
        expires 1y;
        add_header Cache-Control "public";
    }

    # Manejo de errores 404 → también redirige a index.html
    error_page 404 /index.html;
}
